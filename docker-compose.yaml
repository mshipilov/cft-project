services:
  pgdatabase:
    image: postgres:18
    env_file:
      - .env
    volumes:
      - "postgres_data:/var/lib/postgresql"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "${POSTGRES_PORT}:5432"

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: "admin@admin.com"
      PGADMIN_DEFAULT_PASSWORD: "root"
      PGADMIN_CONFIG_PROXY_X_HOST_COUNT: 1
      PGADMIN_CONFIG_PROXY_X_PREFIX_COUNT: 1
    volumes:
      - "pgadmin_data:/var/lib/pgadmin"
    ports:
      - "8085:80"

  backend_app:
    build: .
    command: >
      sh -c "poetry run uvicorn src.main:app --host 0.0.0.0 --port 8000"
    env_file:
      - .env
    depends_on:
      pgdatabase:
        condition: service_healthy
    ports:
      - "${APP_PORT}:8000"



volumes:
  postgres_data:
  pgadmin_data: